name: webblocks
description: "WebBlocks - EduBlocks style HTML/CSS visual block editor for mobile"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.10.0
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  intl: ^0.19.0
  google_fonts: ^6.2.1
  flutter_code_editor: ^0.3.5
  highlight: ^0.7.0
  code_text_field: ^1.1.0
  file_picker: ^10.3.10
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
